# Render Blueprint — deploy everything with one click
# https://render.com/docs/blueprint-spec

databases:
  - name: gigleads-db
    plan: free
    databaseName: gigleads
    user: gigleads

services:
  # Backend — FastAPI
  - type: web
    name: gigleads-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: |
      pip install -r backend/requirements.txt gunicorn
      python -m backend.setup_db
    startCommand: gunicorn backend.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gigleads-db
          property: connectionString
      - key: XAI_API_KEY
        sync: false
      - key: XAI_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: JWT_SECRET
        generateValue: true
      - key: RAPIDAPI_KEY
        sync: false
      - key: RAPIDAPI_KEY_2
        sync: false
      - key: PYTHON_VERSION
        value: "3.13.0"

  # Frontend — Next.js
  - type: web
    name: gigleads-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: gigleads-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
